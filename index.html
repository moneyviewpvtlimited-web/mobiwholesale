<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>MobiWholesale</title>
<meta name="theme-color" content="#0A0E1A"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MobiWholesale"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon.svg"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<style>
:root{
  --bg:#080B14; --surf:#121829; --surf2:#1A2133; --raise:#252E45;
  --line:#232C42; --line-soft:#171E2E;
  --txt:#EEF2FC; --txt2:#9BA7C4; --txt3:#5C6886; --mute:#41506E;
  --indigo:#6588FF; --indigo-deep:#3F5BD6; --indigo-glow:rgba(101,136,255,.40);
  --mint:#2FDCAE; --mint-deep:#16B08A; --mint-glow:rgba(47,220,174,.34);
  --amber:#FBBF4A; --rose:#FF6B6B; --green:#3BDDA0; --violet:#B197FC;
  --amber-bg:rgba(251,191,74,.13); --rose-bg:rgba(255,107,107,.13);
  --green-bg:rgba(59,221,160,.13); --indigo-bg:rgba(101,136,255,.13);
  --mint-bg:rgba(47,220,174,.13); --violet-bg:rgba(177,151,252,.13);
  --accent:var(--indigo); --accent-deep:var(--indigo-deep); --accent-glow:var(--indigo-glow); --accent-bg:var(--indigo-bg);
  --shadow:0 1px 1px rgba(0,0,0,.2),0 4px 16px rgba(0,0,0,.28);
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
button{color:inherit;font-family:inherit}
svg{flex:none;display:inline-block}
input{min-width:0}
.card,.qa,.tap{color:var(--txt)}
html,body{height:100%}
body{background:#04060c;color:var(--txt);min-height:100dvh;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,'Segoe UI',Roboto,system-ui,sans-serif;overscroll-behavior:none;
  font-feature-settings:"cv01","ss01";-webkit-font-smoothing:antialiased;letter-spacing:-.1px}
.shell{width:100%;max-width:430px;height:100dvh;max-height:932px;position:relative;
  background:radial-gradient(130% 60% at 50% -5%,#141d36 0%,var(--bg) 42%);
  overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,.7)}
@media(min-width:480px){.shell{border-radius:40px;border:10px solid #02040a;height:93dvh}}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.b{font-weight:700}.sb{font-weight:600}.tiny{font-size:11px}.mini{font-size:12.5px}
.muted{color:var(--txt2)}.dim{color:var(--txt3)}

/* status bar */
.statusbar{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 22px;
  font-size:12.5px;font-weight:600;flex:none;z-index:40;color:var(--txt)}
.sig{display:inline-flex;gap:1.5px;align-items:flex-end;height:9px;vertical-align:middle}
.sig i{width:2.5px;background:var(--txt);border-radius:1px;display:inline-block}
.sig i:nth-child(1){height:3px}.sig i:nth-child(2){height:5px}.sig i:nth-child(3){height:7px}.sig i:nth-child(4){height:9px}
.batt{display:inline-block;width:20px;height:10px;border:1.4px solid var(--txt);border-radius:3px;position:relative;padding:1px;vertical-align:middle;opacity:.85}
.batt i{display:block;height:100%;width:74%;background:var(--txt);border-radius:1px}

/* appbar */
.appbar{padding:8px 18px 14px;flex:none;z-index:30;display:flex;align-items:center;gap:12px}
.appbar h1{font-size:19px;font-weight:700;letter-spacing:-.5px;flex:1;line-height:1.15}
.appbar .sub{font-size:12px;color:var(--txt2);margin-top:2px;font-weight:500}
.iconbtn{position:relative;width:38px;height:38px;border-radius:12px;background:var(--surf);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;color:var(--txt);cursor:pointer;flex:none}
.iconbtn svg{width:19px;height:19px}
.back{font-size:25px;line-height:1;background:none;border:none;color:var(--txt);cursor:pointer;width:26px;display:flex;align-items:center}
.netchip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:5px 10px;border-radius:999px;
  background:var(--surf);border:1px solid var(--line);color:var(--txt2)}
.netchip svg{width:13px;height:13px}
.netchip.on{color:var(--green)}

.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(100px + env(safe-area-inset-bottom));
  animation:fadeup .22s ease-out}
.scroll::-webkit-scrollbar{width:0}
.pad{padding:4px 18px 18px}
@keyframes fadeup{from{opacity:0}to{opacity:1}}

/* tab bar */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:78px;background:#0A0F1C;
  border-top:1px solid var(--line);display:flex;padding:9px 8px calc(18px + env(safe-area-inset-bottom));z-index:35}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:none;cursor:pointer;
  color:var(--txt3);font-size:10px;font-weight:600;padding:5px 0 0;transition:color .15s;position:relative}
.tab svg{width:22px;height:22px}
.tab.on{color:var(--accent)}
.tab.on::before{content:"";position:absolute;top:-9px;width:26px;height:3px;border-radius:0 0 3px 3px;background:var(--accent)}
.fab{position:absolute;bottom:calc(94px + env(safe-area-inset-bottom));right:18px;width:56px;height:56px;border-radius:18px;
  background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;border:none;cursor:pointer;
  box-shadow:0 10px 30px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;z-index:36;transition:transform .12s}
.fab svg{width:25px;height:25px}
.fab:active{transform:scale(.92)}

/* cards */
.card{background:linear-gradient(180deg,rgba(255,255,255,.02),transparent 40%),var(--surf);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-p{padding:16px}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
h2.sec{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--txt3);margin:24px 4px 12px;display:flex;align-items:center;gap:8px}
h2.sec.first{margin-top:8px}
h2.sec::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.tap{cursor:pointer;transition:transform .12s ease,opacity .15s,border-color .15s}
.tap:active{transform:scale(.975);opacity:.92}

.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.2px}
.pill.green{background:var(--green-bg);color:var(--green)}
.pill.amber{background:var(--amber-bg);color:var(--amber)}
.pill.rose{background:var(--rose-bg);color:var(--rose)}
.pill.indigo{background:var(--indigo-bg);color:var(--indigo)}
.pill.mint{background:var(--mint-bg);color:var(--mint)}
.pill.violet{background:var(--violet-bg);color:var(--violet)}
.pill.gray{background:var(--raise);color:var(--txt2)}
.dot{width:7px;height:7px;border-radius:50%;flex:none}
.avatar{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 2px 6px rgba(0,0,0,.2)}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:14px;border:none;
  font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:transform .12s,opacity .15s}
.btn:active{transform:scale(.98)}
.btn svg{width:18px;height:18px}
.btn-pri{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;box-shadow:0 6px 20px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.22)}
.btn-pri:disabled{opacity:.4;box-shadow:none}
.btn-ghost{background:var(--accent-bg);color:var(--accent)}
.btn-soft{background:var(--surf2);color:var(--txt);border:1px solid var(--line)}
.btn-sm{padding:10px 14px;font-size:13px;width:auto;border-radius:12px}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--txt2);margin:0 0 7px 2px}
.field input,.field select{width:100%;padding:14px;border:1.5px solid var(--line);border-radius:13px;font-size:15px;
  font-family:inherit;background:var(--surf2);color:var(--txt);outline:none;transition:border .15s,box-shadow .15s}
.field input::placeholder{color:var(--txt3)}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.field select{appearance:none;-webkit-appearance:none}

.progress{height:8px;border-radius:999px;background:var(--raise);overflow:hidden}
.progress i{display:block;height:100%;border-radius:999px;transition:width .4s cubic-bezier(.22,1,.36,1)}
.seg{display:flex;background:var(--surf2);border-radius:13px;padding:4px;gap:3px;border:1px solid var(--line)}
.seg button{flex:1;border:none;background:none;padding:9px;border-radius:10px;font-size:12.5px;font-weight:600;color:var(--txt2);cursor:pointer;font-family:inherit;transition:.15s}
.seg button.on{background:var(--raise);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.25)}
.listitem{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line-soft)}
.listitem:last-child{border-bottom:none}

/* sheet */
.scrim{position:absolute;inset:0;background:rgba(3,5,10,.72);z-index:50;display:flex;align-items:flex-end;animation:fade .18s ease}
.sheet{background:var(--surf);width:100%;border-radius:26px 26px 0 0;max-height:92%;overflow-y:auto;
  animation:up .3s cubic-bezier(.22,1,.36,1);padding-bottom:26px;border-top:1px solid var(--line)}
.sheet::-webkit-scrollbar{width:0}
.grab{width:40px;height:5px;border-radius:3px;background:var(--raise);margin:11px auto 4px}
.sheet-h{padding:6px 20px 14px;border-bottom:1px solid var(--line-soft);position:sticky;top:0;background:var(--surf);z-index:2}
.sheet-h h3{font-size:18px;font-weight:700}
.sheet-body{padding:16px 20px}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

.toast{position:absolute;left:18px;right:18px;bottom:98px;background:var(--surf2);border:1px solid var(--line);color:var(--txt);
  padding:14px 16px;border-radius:14px;z-index:60;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow);animation:up .3s cubic-bezier(.22,1,.36,1)}
.toast .ck{width:24px;height:24px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex:none}
.toast .ck svg{width:14px;height:14px;color:#06281d}

.banner{display:flex;gap:11px;align-items:flex-start;padding:13px 14px;border-radius:14px;font-size:12.5px;line-height:1.55}
.banner svg{width:17px;height:17px;flex:none;margin-top:1px}
.banner.indigo{background:var(--indigo-bg);color:#aebcff}
.banner.mint{background:var(--mint-bg);color:#7bf0d2}
.banner.amber{background:var(--amber-bg);color:#f8cd86}
.banner.rose{background:var(--rose-bg);color:#ff9d9d}
.banner.green{background:var(--green-bg);color:#86e9c4}
.banner.violet{background:var(--violet-bg);color:#c9b6ff}

/* hero balance card */
.hero{position:relative;border-radius:22px;padding:20px;overflow:hidden;border:1px solid var(--line);
  background:linear-gradient(150deg,var(--surf2),var(--surf));box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.04)}
.hero .bloom{position:absolute;top:-70px;right:-50px;width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,var(--accent-glow),transparent 68%);pointer-events:none;opacity:.9}
.hero .lab{font-size:11px;font-weight:700;color:var(--txt2);letter-spacing:.6px}
.hero .big{font-size:37px;font-weight:800;letter-spacing:-1.4px;margin-top:7px;line-height:1}
.hero .stat{flex:1}
.hero .stat .sl{font-size:10.5px;color:var(--txt3);font-weight:500}
.hero .stat .sv{font-size:15px;font-weight:700;margin-top:3px}
.hero .divider{width:1px;height:28px;background:var(--line)}

.kpi{padding:15px;border-radius:16px;border:1px solid var(--line);background:var(--surf);position:relative;overflow:hidden}
.kpi .lab{font-size:11px;font-weight:600;color:var(--txt2)}
.kpi .val{font-size:21px;font-weight:800;margin-top:4px;letter-spacing:-.5px}
.kpi .val.sm{font-size:16px}
.kpi .sub{font-size:10.5px;color:var(--txt3);margin-top:3px}
.kpi .tag{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.kpi .tag svg{width:16px;height:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}

.qa{text-align:left;cursor:pointer}
.qa .qaic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center}
.qa .qaic svg{width:21px;height:21px}

.barchart{display:flex;align-items:flex-end;gap:9px;height:120px;padding-top:12px}
.barchart .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.barchart .bar .col{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent),transparent);min-height:4px;opacity:.9}
.barchart .bar .lb{font-size:9.5px;color:var(--txt3);font-weight:600}

.thumb{width:100%;aspect-ratio:1;border-radius:13px;background:var(--surf2);display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;border:1.5px dashed var(--line);color:var(--txt3);font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.thumb svg{width:25px;height:25px}
.thumb.done{border-style:solid;border-color:var(--green);background:var(--green-bg);color:var(--green)}

/* chooser */
.chooser{position:absolute;inset:0;z-index:80;background:radial-gradient(120% 80% at 50% -10%,#101830,#070a14 60%);
  display:flex;flex-direction:column;padding:0 26px;color:var(--txt);animation:fade .4s ease}
.chooser .logo{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--indigo),var(--indigo-deep));
  display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px var(--indigo-glow);animation:pop .5s ease}
.chooser .logo svg{width:34px;height:34px;color:#fff}
.choice{border-radius:20px;border:1px solid var(--line);padding:20px;display:flex;align-items:center;gap:16px;cursor:pointer;
  background:var(--surf);transition:transform .15s,border .15s;position:relative;overflow:hidden}
.choice:active{transform:scale(.98)}
.choice .cic{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;flex:none}
.choice .cic svg{width:26px;height:26px;color:#fff}
.choice .arr{margin-left:auto;color:var(--txt3)}
.choice .cglow{position:absolute;top:-40px;right:-30px;width:140px;height:140px;border-radius:50%;pointer-events:none;opacity:.5}

.splash{position:absolute;inset:0;z-index:90;background:radial-gradient(120% 80% at 50% -10%,#101830,#070a14 60%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .5s}
.splash .logo{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--indigo),var(--indigo-deep));
  display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px var(--indigo-glow);animation:pop .5s ease}
.splash .logo svg{width:40px;height:40px;color:#fff}
</style>
</head>

<div class="shell" id="shell"></div>

    var search='<div class="card" style="display:flex;align-items:center;gap:10px;padding:3px 14px;margin-bottom:11px">'+svg("search",18,'style="color:var(--txt3)"')+'<input oninput="billProdQ=this.value;wBillProductFilter()" value="'+esc(billProdQ)+'" placeholder="Search products you added" style="border:none;outline:none;background:none;padding:13px 0;width:100%;font-size:15px;color:var(--txt);font-family:inherit"></div>';
    var pay=bill.cart.length?'<h2 class="sec">Payment method</h2><div class="seg">'+PAYMODES.map(function(m){return '<button class="'+(bill.payType===m[0]?"on":"")+'" onclick="bill.payType=\''+m[0]+'\';render()">'+svg(m[1],14,'style="margin-right:5px;vertical-align:-2px"')+m[0]+'</button>';}).join("")+'</div>'+(bill.payType==="Online"?'<div class="banner indigo" style="margin-top:12px">'+svg("wa",17)+'<span>Payment link / UPI QR will be shared with the shop on save.</span></div>':"")+(blocked?'<div class="banner rose" style="margin-top:12px">'+svg("shield",17)+'<span><b>Credit limit exceeded.</b> This '+INR(total)+' credit sale needs '+INR(total-avail)+' more than available.</span></div>':''):"";
